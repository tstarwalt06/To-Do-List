<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>To-Do List</h1>
      <p>Stay organized with tags, filters, and saved tasks that remain after refresh.</p>
    </section>

    <section class="content">
      <section class="panel">
        <h2>Add Task</h2>
        <form id="taskForm">
          <div class="form-grid">
            <div>
              <label for="taskInput">Task name</label>
              <input id="taskInput" type="text" placeholder="Enter a task" />
            </div>

            <div>
              <label for="tagInput">Tag</label>
              <input id="tagInput" type="text" placeholder="school, work, personal" />
            </div>
          </div>

          <p id="errorMessage" class="error" aria-live="polite"></p>
          <button type="submit" class="add-btn">Add Task</button>
        </form>
      </section>

      <section class="panel">
        <div class="toolbar">
          <div>
            <h2>Tasks</h2>
            <p class="counter" id="taskCounter">0 active tasks</p>
          </div>

          <div>
            <label for="tagFilter">Filter by tag</label>
            <select id="tagFilter">
              <option value="all">All tags</option>
            </select>
          </div>
        </div>

        <div class="filters">
          <button type="button" class="filter-btn active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="active">Active</button>
          <button type="button" class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="taskList" class="task-list"></ul>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
